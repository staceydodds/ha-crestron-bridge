name: "Crestron CIP Bridge (Universal)"
description: "HTTP API bridge to a Crestron Pro 2 via CIP protocol. Supports all 8 stages via room-category preset (large/medium/small) + per-stage fader map."
version: "3.0.0"
slug: "crestron_bridge_universal"
init: false
arch:
  - amd64
  - aarch64
url: "https://github.com/staceydodds/ha-crestron-bridge"
boot: auto
startup: application
homeassistant_api: true
hassio_api: false
host_network: false
ports:
  "8766/tcp": 8766
ports_description:
  "8766/tcp": "Bridge HTTP API (default 8766 — exposed to host for HA Core access)"
options:
  preset: "large"
  pro2_ip: "10.12.7.15"
  ipid: 5
  stage_id: "stage1"
  http_port: 8766
  log_level: "info"
  enable_projector_serial: false
  enable_masking: true
schema:
  preset: list(large|medium|small|custom|large_theatrical|medium_theatrical|broadcast)
  pro2_ip: str
  ipid: int(1,255)
  stage_id: str
  http_port: port
  log_level: list(debug|info|warning|error)
  enable_projector_serial: bool
  enable_masking: bool
